    <!--
      FLORET SHAPE: bentuk × silang dengan 4 kelopak bulat di ujungnya
      Seperti gambar referensi: 4 bulatan di sudut diagonal (kiri-atas, kanan-atas, kiri-bawah, kanan-bawah)
      + lingkaran kecil di pusat
 
      Path floret:
      Setiap kelopak = ellipse kecil di posisi diagonal 45°
      r = jarak dari center ke tengah kelopak
      Ukuran kelopak rx/ry sesuai besar floret
    -->
